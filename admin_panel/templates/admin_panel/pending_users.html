{% extends "base.html" %}

{% block title %}Persetujuan Akun{% endblock %}
{% block page_title %}Persetujuan Akun{% endblock %}

{% block content %}

<!-- Alpine.js store for confirmation modal -->
<script>
  document.addEventListener('alpine:init', () => {
    Alpine.store('confirmModal', {
      show: false,
      formAction: '',
      newStatus: '',
      userName: '',
      actionWord: '',
      open(formAction, newStatus, userName, actionWord) {
        this.formAction = formAction;
        this.newStatus = newStatus;
        this.userName = userName;
        this.actionWord = actionWord;
        this.show = true;
      },
      close() { this.show = false; }
    });
  });
</script>

<!-- Tabs -->
<div x-data="{ tab: 'pending' }">

  <!-- Tab bar -->
  <div class="flex gap-1 border-b border-gray-200 mb-6">
    <button @click="tab = 'pending'"
            :class="tab === 'pending' ? 'border-b-2 border-primary-600 text-primary-700 font-semibold' : 'text-gray-500 hover:text-gray-700'"
            class="inline-flex items-center gap-2 px-4 py-2.5 text-sm transition-colors">
      Menunggu
      {% if pending_count > 0 %}
      <span class="bg-red-500 text-white text-xs font-bold rounded-full px-2 py-0.5 leading-none">
        {{ pending_count }}
      </span>
      {% endif %}
    </button>
    <button @click="tab = 'approved'"
            :class="tab === 'approved' ? 'border-b-2 border-primary-600 text-primary-700 font-semibold' : 'text-gray-500 hover:text-gray-700'"
            class="px-4 py-2.5 text-sm transition-colors">
      Disetujui
    </button>
    <button @click="tab = 'rejected'"
            :class="tab === 'rejected' ? 'border-b-2 border-primary-600 text-primary-700 font-semibold' : 'text-gray-500 hover:text-gray-700'"
            class="px-4 py-2.5 text-sm transition-colors">
      Ditolak
    </button>
  </div>

  <!-- ── PENDING TAB ─────────────────────────────────── -->
  <div x-show="tab === 'pending'">
    <div id="pending-controls" class="flex flex-col sm:flex-row gap-3 mb-4">
      <input type="hidden" name="status" value="PENDING">
      <input type="text" name="q" placeholder="Cari nama, email, atau username…"
             hx-get="/admin-panel/pending-users/partial/"
             hx-target="#pending-table-wrapper"
             hx-swap="innerHTML"
             hx-trigger="input changed delay:400ms, search"
             hx-include="#pending-controls"
             class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
      <select name="role"
              hx-get="/admin-panel/pending-users/partial/"
              hx-target="#pending-table-wrapper"
              hx-swap="innerHTML"
              hx-trigger="change"
              hx-include="#pending-controls"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
        <option value="">Semua Peran</option>
        <option value="STUDENT">Siswa</option>
        <option value="TEACHER">Guru</option>
      </select>
    </div>
    <div id="pending-table-wrapper"
         hx-get="/admin-panel/pending-users/partial/?status=PENDING"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="flex items-center justify-center py-12 text-gray-400 text-sm">
        Memuat data…
      </div>
    </div>
  </div>

  <!-- ── APPROVED TAB ────────────────────────────────── -->
  <div x-show="tab === 'approved'" x-cloak>
    <div id="approved-controls" class="flex flex-col sm:flex-row gap-3 mb-4">
      <input type="hidden" name="status" value="APPROVED">
      <input type="text" name="q" placeholder="Cari nama, email, atau username…"
             hx-get="/admin-panel/pending-users/partial/"
             hx-target="#approved-table-wrapper"
             hx-swap="innerHTML"
             hx-trigger="input changed delay:400ms, search"
             hx-include="#approved-controls"
             class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
      <select name="role"
              hx-get="/admin-panel/pending-users/partial/"
              hx-target="#approved-table-wrapper"
              hx-swap="innerHTML"
              hx-trigger="change"
              hx-include="#approved-controls"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
        <option value="">Semua Peran</option>
        <option value="STUDENT">Siswa</option>
        <option value="TEACHER">Guru</option>
      </select>
    </div>
    <div id="approved-table-wrapper"
         hx-get="/admin-panel/pending-users/partial/?status=APPROVED"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="flex items-center justify-center py-12 text-gray-400 text-sm">
        Memuat data…
      </div>
    </div>
  </div>

  <!-- ── REJECTED TAB ────────────────────────────────── -->
  <div x-show="tab === 'rejected'" x-cloak>
    <div id="rejected-controls" class="flex flex-col sm:flex-row gap-3 mb-4">
      <input type="hidden" name="status" value="REJECTED">
      <input type="text" name="q" placeholder="Cari nama, email, atau username…"
             hx-get="/admin-panel/pending-users/partial/"
             hx-target="#rejected-table-wrapper"
             hx-swap="innerHTML"
             hx-trigger="input changed delay:400ms, search"
             hx-include="#rejected-controls"
             class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm
                    focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
      <select name="role"
              hx-get="/admin-panel/pending-users/partial/"
              hx-target="#rejected-table-wrapper"
              hx-swap="innerHTML"
              hx-trigger="change"
              hx-include="#rejected-controls"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                     focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
        <option value="">Semua Peran</option>
        <option value="STUDENT">Siswa</option>
        <option value="TEACHER">Guru</option>
      </select>
    </div>
    <div id="rejected-table-wrapper"
         hx-get="/admin-panel/pending-users/partial/?status=REJECTED"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div class="flex items-center justify-center py-12 text-gray-400 text-sm">
        Memuat data…
      </div>
    </div>
  </div>

</div><!-- end tabs -->

<!-- ── CONFIRMATION MODAL ─────────────────────────────── -->
<div x-data
     x-show="$store.confirmModal.show"
     x-cloak
     x-transition:enter="transition ease-out duration-150"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-100"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-center justify-center px-4"
     @keydown.escape.window="$store.confirmModal.close()">

  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/40" @click="$store.confirmModal.close()"></div>

  <!-- Dialog -->
  <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-sm p-6"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100">

    <!-- Icon -->
    <div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center mx-auto mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-yellow-600">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>

    <h3 class="text-base font-bold text-gray-900 text-center mb-1">Konfirmasi Tindakan</h3>
    <p class="text-sm text-gray-600 text-center mb-1">
      Apakah Anda yakin ingin
      <span class="font-semibold" x-text="$store.confirmModal.actionWord"></span>
      pengguna ini?
    </p>
    <p class="text-sm font-semibold text-gray-900 text-center mb-6"
       x-text="$store.confirmModal.userName"></p>

    <form method="post"
          :action="$store.confirmModal.formAction">
      {% csrf_token %}
      <input type="hidden" name="new_status" :value="$store.confirmModal.newStatus">
      <div class="flex gap-3">
        <button type="button"
                @click="$store.confirmModal.close()"
                class="flex-1 px-4 py-2.5 border border-gray-200 text-gray-700 text-sm
                       font-semibold rounded-xl hover:bg-gray-50 transition-colors">
          Batal
        </button>
        <button type="submit"
                class="flex-1 px-4 py-2.5 bg-primary-600 hover:bg-primary-700 text-white
                       text-sm font-semibold rounded-xl transition-colors">
          Ya, Lanjutkan
        </button>
      </div>
    </form>
  </div>
</div>

<!-- x-cloak style -->
<style>[x-cloak] { display: none !important; }</style>

{% endblock %}
