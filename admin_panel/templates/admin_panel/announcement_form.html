{% extends "base.html" %}

{% block title %}Edit Pengumuman{% endblock %}
{% block page_title %}Edit Pengumuman{% endblock %}

{% block content %}
<div class="max-w-xl">

  <a href="{% url 'admin_panel:announcements_list' %}"
     class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors mb-5 block">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke-width="2" stroke="currentColor" class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    Kembali ke Daftar
  </a>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <h2 class="text-base font-semibold text-gray-900 mb-5">Edit Pengumuman</h2>

    {% if messages %}
    {% for msg in messages %}
    <div class="mb-4 px-4 py-3 rounded-lg text-sm
      {% if msg.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
      {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
      {{ msg }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post" x-data="{ targetRole: '{{ ann.target_role }}' }">
      {% csrf_token %}
      <div class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Judul <span class="text-red-500">*</span></label>
          <input type="text" name="title" value="{{ ann.title }}"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                        focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent"
                 required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ditujukan untuk</label>
          <select name="target_role" x-model="targetRole"
                  class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                         focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent">
            {% for val, label in target_role_choices %}
            <option value="{{ val }}" {% if ann.target_role == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div x-show="targetRole === 'STUDENT'" x-cloak>
          <label class="block text-sm font-medium text-gray-700 mb-1">Jenjang</label>
          <select name="level"
                  class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                         focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent">
            {% for val, label in level_choices %}
            <option value="{{ val }}" {% if ann.level == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Isi Pengumuman <span class="text-red-500">*</span></label>
          <textarea name="content" rows="6"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent resize-none"
                    required>{{ ann.content }}</textarea>
        </div>

        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2">
            <input type="checkbox" name="is_pinned" id="is_pinned"
                   class="rounded border-gray-300 text-primary-600 focus:ring-primary-400"
                   {% if ann.is_pinned %}checked{% endif %}>
            <label for="is_pinned" class="text-sm text-gray-700">Sematkan</label>
          </div>
          <div class="flex items-center gap-2">
            <input type="checkbox" name="is_active" id="is_active"
                   class="rounded border-gray-300 text-green-600 focus:ring-green-400"
                   {% if ann.is_active %}checked{% endif %}>
            <label for="is_active" class="text-sm text-gray-700">Aktif</label>
          </div>
        </div>

        <button type="submit"
                class="w-full py-2.5 px-4 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium
                       rounded-lg transition-colors">
          Simpan Perubahan
        </button>

      </div>
    </form>
  </div>

</div>
{% endblock %}
