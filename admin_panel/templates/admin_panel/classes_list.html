{% extends "base.html" %}

{% block title %}Kelola Kelas{% endblock %}
{% block page_title %}Kelola Kelas{% endblock %}

{% block content %}

<!-- Export bar -->
<div class="flex justify-end mb-3">
  <a href="{% url 'admin_panel:export_classes_excel' %}"
     class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-green-700
            border border-green-300 bg-green-50 rounded-lg hover:bg-green-100 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke-width="1.75" stroke="currentColor" class="w-4 h-4">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
    </svg>
    Export Kelas (Excel)
  </a>
</div>

<!-- Controls -->
<div id="classes-controls" class="flex flex-col sm:flex-row gap-3 mb-5 flex-wrap">
  <input type="text" name="q" placeholder="Cari nama kelas atau guru…"
         hx-get="/admin-panel/classes/partial/"
         hx-target="#classes-table-wrapper"
         hx-swap="innerHTML"
         hx-trigger="input changed delay:400ms, search"
         hx-include="#classes-controls"
         class="flex-1 min-w-48 border border-gray-200 rounded-lg px-3 py-2 text-sm
                focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">

  <select name="level"
          hx-get="/admin-panel/classes/partial/"
          hx-target="#classes-table-wrapper"
          hx-swap="innerHTML"
          hx-trigger="change"
          hx-include="#classes-controls"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                 focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
    <option value="">Semua Jenjang</option>
    <option value="SD">SD</option>
    <option value="SMP">SMP</option>
    <option value="SMA">SMA</option>
  </select>

  <select name="status"
          hx-get="/admin-panel/classes/partial/"
          hx-target="#classes-table-wrapper"
          hx-swap="innerHTML"
          hx-trigger="change"
          hx-include="#classes-controls"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                 focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
    <option value="">Semua Status</option>
    <option value="OPEN">Buka</option>
    <option value="FULL">Penuh</option>
    <option value="CLOSED">Tutup</option>
    <option value="DELETED">Dihapus</option>
  </select>

  <select name="period"
          hx-get="/admin-panel/classes/partial/"
          hx-target="#classes-table-wrapper"
          hx-swap="innerHTML"
          hx-trigger="change"
          hx-include="#classes-controls"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                 focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
    <option value="">Semua Periode</option>
    {% for period in periods %}
    <option value="{{ period.pk }}">{{ period.name }}</option>
    {% endfor %}
  </select>
</div>

<!-- Table -->
<div id="classes-table-wrapper"
     hx-get="/admin-panel/classes/partial/"
     hx-trigger="load"
     hx-swap="innerHTML">
  <div class="flex items-center justify-center py-12 text-gray-400 text-sm">
    Memuat data…
  </div>
</div>

{% endblock %}
