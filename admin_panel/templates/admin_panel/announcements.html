{% extends "base.html" %}

{% block title %}Pengumuman — Admin{% endblock %}
{% block page_title %}Pengumuman{% endblock %}

{% block extra_css %}
<style>
.dp-page { padding: 4px 0; }
.dp-page-h { display: flex; justify-content: space-between; align-items: flex-end; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.dp-page-h h1 { font-size: 20px; font-weight: 700; color: #0f172a; margin: 0; }
.dp-page-h p { font-size: 12px; color: #64748b; margin: 2px 0 0; }
.dp-btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; font-size: 13px; font-weight: 700; color: #ffffff; background: #4a9499; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; transition: background 0.15s; }
.dp-btn-primary:hover { background: #3d7c80; }

.dp-toolbar { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 14px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
.dp-search { flex: 1; min-width: 220px; position: relative; }
.dp-search i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 14px; }
.dp-search input { width: 100%; padding: 8px 12px 8px 34px; font-size: 13px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
.dp-search input:focus { outline: none; background: #ffffff; border-color: #7fcacd; box-shadow: 0 0 0 3px rgba(127,202,205,0.18); }
.dp-status-sel { font-size: 12px; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #ffffff; color: #334155; font-family: inherit; min-width: 140px; }
.dp-status-sel:focus { outline: none; border-color: #7fcacd; box-shadow: 0 0 0 3px rgba(127,202,205,0.18); }

#anns-table-wrapper { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
.dp-loading { padding: 40px; text-align: center; color: #94a3b8; font-size: 13px; }
</style>
{% endblock %}

{% block content %}
<div class="dp-page">

  <div class="dp-page-h">
    <div>
      <h1>Pengumuman</h1>
      <p>Buat &amp; kelola pengumuman untuk siswa atau guru.</p>
    </div>
    <a href="{% url 'admin_panel:announcement_create' %}" class="dp-btn-primary">
      <i class="ti ti-plus"></i> Tambah Pengumuman
    </a>
  </div>

  <div id="anns-controls" class="dp-toolbar">
    <div class="dp-search">
      <i class="ti ti-search"></i>
      <input type="text" name="q" value="{{ q }}" placeholder="Cari judul atau isi pengumuman…"
             hx-get="{% url 'admin_panel:announcements_list_partial' %}"
             hx-target="#anns-table-wrapper"
             hx-swap="innerHTML"
             hx-trigger="input changed delay:400ms, search"
             hx-include="#anns-controls"
             autocomplete="off">
    </div>
    <select name="role" class="dp-status-sel"
            hx-get="{% url 'admin_panel:announcements_list_partial' %}"
            hx-target="#anns-table-wrapper"
            hx-swap="innerHTML"
            hx-trigger="change"
            hx-include="#anns-controls">
      <option value="">Semua Target</option>
      <option value="ALL"     {% if role_filter == 'ALL' %}selected{% endif %}>Semua</option>
      <option value="STUDENT" {% if role_filter == 'STUDENT' %}selected{% endif %}>Siswa</option>
      <option value="TEACHER" {% if role_filter == 'TEACHER' %}selected{% endif %}>Guru</option>
    </select>
    <select name="status" class="dp-status-sel"
            hx-get="{% url 'admin_panel:announcements_list_partial' %}"
            hx-target="#anns-table-wrapper"
            hx-swap="innerHTML"
            hx-trigger="change"
            hx-include="#anns-controls">
      <option value="">Semua Status</option>
      <option value="active"   {% if status_filter == 'active' %}selected{% endif %}>Aktif</option>
      <option value="inactive" {% if status_filter == 'inactive' %}selected{% endif %}>Nonaktif</option>
      <option value="pinned"   {% if status_filter == 'pinned' %}selected{% endif %}>Pinned</option>
    </select>
  </div>

  <div id="anns-table-wrapper"
       hx-get="{% url 'admin_panel:announcements_list_partial' %}?q={{ q|urlencode }}&role={{ role_filter }}&status={{ status_filter }}"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="dp-loading">Memuat data…</div>
  </div>

</div>
{% endblock %}
