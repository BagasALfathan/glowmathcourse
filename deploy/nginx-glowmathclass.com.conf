# ─────────────────────────────────────────────────────────────────────────
# Nginx site config for glowmathclass.com
#
# Install:
#   sudo cp deploy/nginx-glowmathclass.com.conf /etc/nginx/sites-available/glowmathclass.com
#   sudo ln -s /etc/nginx/sites-available/glowmathclass.com /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then run certbot to issue SSL + add the 443 server block automatically:
#   sudo certbot --nginx -d glowmathclass.com -d www.glowmathclass.com \
#                --non-interactive --agree-tos -m admin@glowmathclass.com
#
# After certbot, the HTTP block below stays and certbot adds a separate
# HTTPS block + an HTTP→HTTPS redirect.
# ─────────────────────────────────────────────────────────────────────────

upstream glowmath_app {
    server unix:/var/www/glowmathcourse/gunicorn.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name glowmathclass.com www.glowmathclass.com;

    # 25 MB to accommodate the 20 MB course-material upload cap (Prompt 11).
    # Bumping above ~25 MB would also require gunicorn --limit-request-line tuning.
    client_max_body_size 25M;
    keepalive_timeout 60s;

    # Static (collectstatic output). WhiteNoise also serves /static/ from
    # Gunicorn, but letting Nginx serve directly is faster + offloads workers.
    location /static/ {
        alias /var/www/glowmathcourse/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # User-uploaded media (teacher photos + course materials).
    # Required so /media/course_materials/YYYY/MM/<file> is reachable from
    # student devices — WhiteNoise does NOT serve media in prod.
    location /media/ {
        alias /var/www/glowmathcourse/media/;
        expires 7d;
        # Prevent the server from auto-executing anything that landed in /media/
        # (we whitelist extensions at the app level too — defense in depth).
        location ~ \.(php|py|sh|cgi|pl|exe|bat)$ {
            deny all;
        }
    }

    location = /favicon.ico {
        alias /var/www/glowmathcourse/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://glowmath_app;
        access_log off;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_pass http://glowmath_app;
    }

    # ACME challenge path stays plain HTTP — certbot needs this.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
