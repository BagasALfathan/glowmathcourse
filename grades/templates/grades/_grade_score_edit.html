{# HTMX fragment: inline score edit form #}
<form hx-post="{% url 'grades:teacher_grade_inline_save' grade.pk %}"
      hx-target="#score-cell-{{ grade.pk }}"
      hx-swap="innerHTML"
      class="flex items-center gap-1">
  {% csrf_token %}
  <input type="number" name="score" value="{{ grade.score|floatformat:'-2' }}"
         min="0" max="100" step="0.5"
         class="w-20 px-2 py-1 text-sm border border-primary-300 rounded-lg
                focus:outline-none focus:ring-2 focus:ring-primary-300"
         autofocus>
  <button type="submit"
          class="px-2 py-1 text-xs font-semibold text-white bg-primary-600
                 rounded-lg hover:bg-primary-700 transition-colors">
    ✓
  </button>
  <button type="button"
          hx-get="{% url 'grades:teacher_grade_inline_edit' grade.pk %}?cancel=true"
          hx-target="#score-cell-{{ grade.pk }}"
          hx-swap="innerHTML"
          class="px-2 py-1 text-xs font-medium text-gray-500 bg-gray-100
                 rounded-lg hover:bg-gray-200 transition-colors">
    ✕
  </button>
  {% if error %}
  <span class="text-xs text-red-500">{{ error }}</span>
  {% endif %}
</form>
