{% extends "base.html" %}

{% block title %}Progress — {{ student.get_full_name }}{% endblock %}
{% block page_title %}Laporan Progress Siswa{% endblock %}

{% block content %}
<div class="space-y-5">

  <!-- Top bar: back + actions -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <a href="{{ back_url }}"
       class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Kembali ke Daftar Siswa
    </a>
    <div class="flex gap-2 flex-wrap">
      <a href="{{ print_url }}" target="_blank"
         class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700
                bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.75" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-1.913-.247M6.34 18H5.25A2.25 2.25 0 013 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 011.913-.247m10.5 0a48.536 48.536 0 00-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5zm-3 0h.008v.008H15V10.5z" />
        </svg>
        Cetak Laporan
      </a>
      <a href="{{ pdf_url }}"
         class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white
                bg-primary-600 rounded-lg hover:bg-primary-700 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="1.75" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Export PDF
      </a>
    </div>
  </div>

  {% include "grades/_progress_report_body.html" %}

</div>
{% endblock %}
