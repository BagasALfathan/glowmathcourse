{% load i18n %}
{# HTMX fragment: read-only score cell — click to switch to edit mode #}
<span id="score-display-{{ grade.pk }}"
      class="font-semibold text-base cursor-pointer hover:underline hover:text-primary-600 transition-colors
        {% if grade.score >= 80 %}text-green-600
        {% elif grade.score >= 60 %}text-yellow-600
        {% else %}text-red-500{% endif %}"
      hx-get="{% url 'grades:teacher_grade_inline_edit' grade.pk %}"
      hx-target="#score-cell-{{ grade.pk }}"
      hx-swap="innerHTML"
      title="Klik untuk edit">
  {{ grade.score|floatformat:"-2" }}
</span>
