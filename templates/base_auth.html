<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GlowMathCourse{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#f0fafa',
              100: '#d9f2f3',
              200: '#b5e6e8',
              300: '#7fcacd',
              400: '#5ab5b9',
              500: '#3d9da1',
              600: '#2f7d80',
              700: '#286265',
              800: '#234f51',
              900: '#1f4143',
            }
          }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-blue-50 flex flex-col">

  <div class="flex-1 flex flex-col items-center justify-center px-4 py-12">

    <!-- Logo / Brand -->
    <a href="/login/" class="flex items-center gap-2 mb-8">
      <div class="w-10 h-10 rounded-xl bg-primary-600 flex items-center justify-center shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke-width="2" stroke="white" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M4.26 10.147a60.436 60.436 0 00-.491 6.347A48.627 48.627 0 0112 20.904a48.627 48.627 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.57 50.57 0 00-2.658-.813A59.905 59.905 0 0112 3.493a59.902 59.902 0 0110.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0112 13.489a50.702 50.702 0 017.74-3.342M6.75 15a.75.75 0 100-1.5.75.75 0 000 1.5zm0 0v-3.675A55.378 55.378 0 0112 8.443m-7.007 11.55A5.981 5.981 0 006.75 15.75v-1.5" />
        </svg>
      </div>
      <span class="text-2xl font-bold text-primary-700 tracking-tight">GlowMathCourse</span>
    </a>

    <!-- Card -->
    <div class="w-full {% block card_width %}max-w-md{% endblock %} bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
      {% block content %}{% endblock %}
    </div>

    <!-- Footer links -->
    {% block auth_footer %}{% endblock %}

  </div>

  <footer class="text-center py-4 text-xs text-gray-400">
    &copy; 2026 GlowMathCourse. Hak cipta dilindungi.
  </footer>

  {% block extra_js %}{% endblock %}
</body>
</html>
