{% extends "base.html" %}

{% block title %}Cari Kelas{% endblock %}
{% block page_title %}Cari Kelas{% endblock %}

{% block content %}
<div class="space-y-5">

  <!-- Info banner -->
  <div class="bg-primary-50 border border-primary-100 rounded-xl px-5 py-3 flex items-center gap-3">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
         stroke-width="1.75" stroke="currentColor" class="w-4 h-4 text-primary-500 shrink-0">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
    </svg>
    <p class="text-sm text-primary-700">
      Menampilkan kelas terbuka untuk jenjang
      <span class="font-semibold">{{ student_level }}</span>.
    </p>
  </div>

  <!-- Filters -->
  <div id="browse-filters" class="flex flex-col sm:flex-row gap-3">
    <select name="subject"
            hx-get="{% url 'academics:class_browse_partial' %}"
            hx-target="#class-grid"
            hx-swap="innerHTML"
            hx-trigger="change"
            hx-include="#browse-filters"
            class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
      <option value="">Semua Mata Pelajaran</option>
      {% for subj in subjects %}
      <option value="{{ subj.pk }}">{{ subj.name }}</option>
      {% endfor %}
    </select>

    <select name="day"
            hx-get="{% url 'academics:class_browse_partial' %}"
            hx-target="#class-grid"
            hx-swap="innerHTML"
            hx-trigger="change"
            hx-include="#browse-filters"
            class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-primary-300 focus:border-primary-400">
      <option value="">Semua Hari</option>
      {% for val, label in days %}
      <option value="{{ val }}">{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Class grid (HTMX target) -->
  <div id="class-grid"
       hx-get="{% url 'academics:class_browse_partial' %}"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="flex items-center justify-center py-12 text-gray-400 text-sm">
      Memuat kelas…
    </div>
  </div>

</div>
{% endblock %}
