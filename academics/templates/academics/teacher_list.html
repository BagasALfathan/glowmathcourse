{% extends "base.html" %}

{% block title %}Daftar Guru{% endblock %}
{% block page_title %}Daftar Guru{% endblock %}

{% block content %}
<div class="space-y-5">

  <!-- Controls -->
  <div id="teacher-controls" class="flex flex-col sm:flex-row gap-3">
    <input type="text" name="q" placeholder="Cari nama guru…"
           hx-get="{% url 'academics:teacher_list_partial' %}"
           hx-target="#teacher-grid"
           hx-swap="innerHTML"
           hx-trigger="input changed delay:350ms, search"
           hx-include="#teacher-controls"
           class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm
                  focus:outline-none focus:ring-2 focus:ring-teal-300 focus:border-teal-400" />

    <select name="specialization"
            hx-get="{% url 'academics:teacher_list_partial' %}"
            hx-target="#teacher-grid"
            hx-swap="innerHTML"
            hx-trigger="change"
            hx-include="#teacher-controls"
            class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white
                   focus:outline-none focus:ring-2 focus:ring-teal-300 focus:border-teal-400">
      <option value="">Semua Spesialisasi</option>
      {% for spec in specializations %}
      <option value="{{ spec }}">{{ spec }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Grid loaded via HTMX on page load -->
  <div id="teacher-grid"
       hx-get="{% url 'academics:teacher_list_partial' %}"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="flex items-center justify-center py-12 text-gray-400 text-sm">
      Memuat data…
    </div>
  </div>

</div>
{% endblock %}
